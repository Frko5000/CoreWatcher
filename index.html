<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreWatcher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: #f8fafc; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        .header p {
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 4px;
        }
 
        .row {
            display: flex;
            gap: 14px;
            width: 100%;
            max-width: 1100px;
            flex-wrap: nowrap;
        }
 
        .card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px);
            padding: 20px 18px; 
            border-radius: 18px; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
            flex: 1;
            min-width: 0;
        }
        .card:hover { transform: translateY(-4px); border-color: #38bdf8; }
 
        .ip-card {
            margin-top: 14px;
            width: 100%;
            max-width: 1100px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 14px 24px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
 
        h3 { 
            margin-bottom: 10px; 
            color: #94a3b8; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            white-space: nowrap;
        }
        .value { 
            font-size: 1.9rem; 
            font-weight: 800; 
            color: #38bdf8; 
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sub-value { 
            font-size: 0.82rem; 
            color: #64748b; 
            margin-top: 6px;
            white-space: nowrap;
        }
 
        .status-dot { 
            width: 9px; height: 9px; 
            background: #22c55e; 
            border-radius: 50%; 
            display: inline-block; 
            margin-right: 7px; 
            box-shadow: 0 0 8px #22c55e; 
        }
        .na-text { color: #475569; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>CoreWatcher</h1>
        <p>System Monitoring Engine</p>
    </div>
 
    <div class="row">
 
        <div class="card">
            <h3>CPU Load</h3>
            <span class="value" id="cpu">—</span>
            <div class="sub-value">Temp: <span id="cpuTemp">—</span></div>
        </div>
 
        <div class="card">
            <h3>Memory</h3>
            <span class="value" id="ram">—</span>
            <div class="sub-value"><span id="ramUsed">0</span> / <span id="ramTotal">0</span> GB</div>
        </div>
 
        <div class="card">
            <h3>Disk Storage</h3>
            <span class="value" style="font-size:1.4rem;">
                <span id="diskUsed">0</span>
                <span style="color:#64748b;font-size:0.95rem;"> / <span id="diskTotal">0</span> GB</span>
            </span>
            <div class="sub-value">Filesystem capacity</div>
        </div>
 
        <div class="card">
            <h3>Uptime</h3>
            <span class="value" id="uptime">—</span>
            <div class="sub-value">System running time</div>
        </div>
 
        <div class="card">
            <h3>GPU</h3>
            <span class="value" style="font-size:1.1rem;" id="gpuName">—</span>
            <div class="sub-value">Temp: <span id="gpuTemp">—</span> &nbsp;|&nbsp; VRAM: <span id="gpuVram">—</span></div>
        </div>
 
    </div>
 
    <div class="ip-card">
        <div>
            <span class="status-dot"></span>
            <span style="color:#94a3b8; font-size:0.9rem;">Network Active</span>
        </div>
        <span id="ip" style="font-family:monospace; color:#818cf8; font-weight:bold;">Loading...</span>
    </div>
 
    <script>
        function set(id, value, suffix) {
            const el = document.getElementById(id);
            if (!el) return;
            if (value === null || value === undefined) {
                el.innerHTML = '<span class="na-text">N/A</span>';
            } else {
                el.innerText = suffix ? value + suffix : value;
            }
        }
 
        async function updateStats() {
            try {
                const res = await fetch('http://localhost:3000/stats');
                const d = await res.json();
 
                set('cpu',      d.cpu,     '%');
                set('cpuTemp',  d.cpuTemp  != null ? d.cpuTemp  + '°C' : null);
                set('ram',      d.ram,     '%');
                set('ramUsed',  d.ramUsed);
                set('ramTotal', d.ramTotal);
                set('diskUsed', d.diskUsed);
                set('diskTotal',d.diskTotal);
                set('uptime',   d.uptime,  'h');
                set('ip',       d.ip);
                set('gpuName',  d.gpuName);
                set('gpuTemp',  d.gpuTemp  != null ? d.gpuTemp  + '°C' : null);
                set('gpuVram',  d.gpuVram  != null ? d.gpuVram  + ' MB' : null);
            } catch (err) {
                console.error('Connection lost');
            }
        }
 
        setInterval(updateStats, 3000);
        updateStats();
    </script>
</body>
</html>
